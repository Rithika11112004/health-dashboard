version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-https://your-supabase-url.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-your-supabase-anon-key}

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
